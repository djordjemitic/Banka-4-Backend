syntax = "proto3";

package user.v1;

option go_package = "common/pkg/pb;pb";

service UserService {
  rpc GetClientById(GetClientByIdRequest)             returns (GetClientByIdResponse);
  rpc GetEmployeeById(GetEmployeeByIdRequest)         returns (GetEmployeeByIdResponse);
  rpc GetAllClients(GetAllClientsRequest)             returns (GetAllClientsResponse);
  rpc GetAllActuaries(GetAllActuariesRequest)         returns (GetAllActuariesResponse);
  rpc GetIdentityByUserId(GetIdentityByUserIdRequest) returns (GetIdentityByUserIdResponse);
}


message GetClientByIdRequest  { uint64 id = 1; }
message GetClientByIdResponse {
  uint64 id          = 1;
  string email       = 2;
  string full_name   = 3;
  uint64 identity_id = 4;
}

message GetEmployeeByIdRequest  { uint64 id = 1; }
message GetEmployeeByIdResponse {
  uint64 id            = 1;
  string email         = 2;
  string full_name     = 3;
  bool   is_supervisor = 4;
  bool   is_agent      = 5;
  bool   need_approval = 6;
  double order_limit   = 7;
  double used_limit    = 8;
  uint64 identity_id   = 9;
}



message GetAllClientsRequest {
  int32  page       = 1;
  int32  page_size  = 2;
  string first_name = 3;
  string last_name  = 4;
}

message ClientResponse {
  uint64 id           = 1;
  string first_name   = 2;
  string last_name    = 3;
  string email        = 4;
}

message GetAllClientsResponse {
  repeated ClientResponse clients     = 1;
  int64                   total       = 2;
  int32                   page        = 3;
  int32                   page_size   = 4;
  int32                   total_pages = 5;
}


message GetAllActuariesRequest {
  int32  page         = 1;
  int32  page_size    = 2;
  string first_name   = 3;
  string last_name    = 4;
}

message ActuaryResponse {
  uint64 id            = 1;
  string first_name    = 2;
  string last_name     = 3;
  string email         = 4;

}

message GetAllActuariesResponse {
  repeated ActuaryResponse actuaries  = 1;
  int64                    total      = 2;
  int32                    page       = 3;
  int32                    page_size  = 4;
  int32                    total_pages = 5;
}

message GetIdentityByUserIdRequest {
  uint64 user_id   = 1;
  string user_type = 2;
}

message GetIdentityByUserIdResponse {
  uint64 identity_id = 1;
}
