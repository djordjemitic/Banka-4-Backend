syntax = "proto3";

package banking.v1;

option go_package = "common/pkg/pb;pb";

service BankingService {
  rpc GetAccountByNumber(GetAccountByNumberRequest) returns (GetAccountByNumberResponse);
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetAccountsByClientID(GetAccountsByClientIDRequest) returns (GetAccountsByClientIDResponse);
}

message GetAccountByNumberRequest {
  string account_number = 1;
}

message GetAccountByNumberResponse {
  string account_number  = 1;
  uint64 client_id       = 2;
  string account_type    = 3;
  string currency_code   = 4;
  double available_balance = 5;
}

message CreatePaymentRequest {
  string payer_account_number     = 1;
  string recipient_account_number = 2;
  string recipient_name           = 3;
  double amount                   = 4;
  string reference_number         = 5;
  string payment_code             = 6;
  string purpose                  = 7;
}

message CreatePaymentResponse {
  uint64 payment_id      = 1;
  uint64 transaction_id  = 2;
  string status          = 3;
}

message GetAccountsByClientIDRequest {
  uint64 client_id = 1;
}

message GetAccountsByClientIDResponse {
  repeated AccountInfo accounts = 1;
}

message AccountInfo {
  string account_number = 1;
  string currency_code = 2;
}

