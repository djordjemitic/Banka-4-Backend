services:
  user_service_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - user_service_db_data:/var/lib/postgresql/data

  user_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user-service
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
    depends_on:
      user_service_db:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    working_dir: /app/user-service

  banking_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: banking-service
    ports:
      - "${BANKING_SERVICE_PORT}:${BANKING_SERVICE_PORT}"
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: ${BANKING_SERVICE_PORT}
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${BANKING_SERVICE_PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    working_dir: /app/banking-service

  trading_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: trading-service
    ports:
      - "${TRADING_SERVICE_PORT}:${TRADING_SERVICE_PORT}"
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: ${TRADING_SERVICE_PORT}
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${TRADING_SERVICE_PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    working_dir: /app/trading-service

  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    volumes:
      - maildev_data:/data

volumes:
  user_service_db_data:
  maildev_data:
