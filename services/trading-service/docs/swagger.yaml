          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get accumulated tax for a client
      tags:
      - tax
  /api/client/{clientId}/assets:
    get:
      description: Returns all currently held asset positions for a client, aggregated
