name: Build (w/o Docker)
run-name: Build for ${{ github.repository }}

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - banking-service
          - trading-service
          - user-service

    steps:
    - name: Check out ${{ github.ref }} after a ${{ github.event_name }} event
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: './go.work'
        cache-dependency-path: '**/go.mod'

    - name: Build ${{ matrix.service }}
      run: go build -v ./services/${{ matrix.service }}/cmd/main.go
