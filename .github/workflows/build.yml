name: Banka 4 CI - Build (w/o Docker)
run-name: Build for ${{ github.repository }}

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out ${{ github.ref }} after a ${{ github.event_name }} event
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build the application
      run: |
        for service in $(ls -d ./services/*/); do
          echo "::group::Building $service..."
          go build -v $service/cmd/main.go
          echo "::endgroup::"
        done