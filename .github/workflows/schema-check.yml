name: Schema Check
run-name: Schema check for ${{ github.repository }}

on:
  workflow_dispatch:
  pull_request:

jobs:
  schema-check:
    name: Schema check ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-service
            package: ./services/user-service/internal/model
          - name: banking-service
            package: ./services/banking-service/internal/model

    steps:
      - name: Check out ${{ github.ref }} after a ${{ github.event_name }} event
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.work
          cache-dependency-path: '**/go.mod'

      - name: Run schema check tests for ${{ matrix.name }}
        run: go test -tags=schema -v ${{ matrix.package }}


